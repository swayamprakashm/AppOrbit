name: apporbit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Charts
  cupertino_icons: ^1.0.8
  glassmorphism: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2

  # Animations & Typography
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Data & Storage
  shared_preferences: ^2.2.3
  intl: ^0.19.0

  # Auth & Security
  google_sign_in: ^6.3.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# Launcher Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Assets Declaration
  assets:
    - assets/app_logo.png
    - assets/accepted.lottie
    - assets/denied.lottie
    - assets/swayam.png
    - assets/akshaya.png
    - assets/sairam.png